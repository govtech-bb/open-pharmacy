name: Deploy to GitHub Pages

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          ref: staging
          path: staging

      - name: Assemble site
        run: |
          set -euxo pipefail
          ls -la main/
          ls -la staging/
          mkdir -p _site
          cp -r main/. _site/
          rm -rf _site/.git _site/.github
          mkdir -p _site/staging
          cp -r staging/. _site/staging/
          rm -rf _site/staging/.git _site/staging/.github
          echo "=== _site listing ==="
          ls -la _site/
          echo "=== _site/staging listing ==="
          ls -la _site/staging/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
