name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to push to gh-pages branch

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          ref: staging
          path: staging

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -r main/. _site/
          rm -rf _site/.git _site/.github
          mkdir -p _site/staging
          cp -r staging/. _site/staging/
          rm -rf _site/staging/.git _site/staging/.github
          touch _site/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy ${{ github.sha }} (main + staging/)"
